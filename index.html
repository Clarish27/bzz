<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#ff4d6d,#ff8fab,#ffc2d1);
    overflow:hidden;
}

.container{
    background:#fff;
    width:90%;
    max-width:700px;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
    animation:fadeIn 1s;
}

h1{
    color:#ff2e63;
    font-size:50px;
    margin-bottom:10px;
}

p{
    color:#555;
    margin-bottom:25px;
    font-size:18px;
}

button{
    background:#ff2e63;
    color:white;
    border:none;
    padding:18px 45px;
    font-size:22px;
    border-radius:50px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    background:#e6004c;
}

#videoBox{
    display:none;
    margin-top:30px;
}

video{
    width:100%;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

#loveText{
    color:#ff2e63;
    font-size:30px;
    margin-bottom:15px;
    font-weight:bold;
}

.heart{
    position:absolute;
    color:red;
    animation:fly linear forwards;
}

@keyframes fly{
    0%{
        transform:translateY(100vh) scale(.5);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) scale(2);
        opacity:0;
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
</style>

</head>
<body>

<div class="container">

<h1>❤️ I Love You ❤️</h1>

<p>Click the button below.</p>

<button onclick="showVideo()">
I Love You ❤️
</button>

<div id="videoBox">

<div id="loveText">
I Love You So Much ❤️
</div>

<video id="video" controls autoplay>
<source src="love.mp4" type="video/mp4">
Your browser does not support HTML5 video.
</video>

</div>

</div>

<script>

function showVideo(){

document.getElementById("videoBox").style.display="block";

let video=document.getElementById("video");
video.play();

for(let i=0;i<80;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(15+Math.random()*35)+"px";

heart.style.animationDuration=(3+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

}

}

</script>

</body>
</html>
